name: Weekly CFTC Chart Update

on:
  schedule:
    - cron: '30 20 * * 5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            requests==2.32.3 \
            pandas==2.2.3 \
            yfinance==0.2.61 \
            matplotlib==3.10.0

      - name: Run Tracker Script
        run: python tracker.py

      - name: Commit and Push Image
        run: |
          if [ ! -f cftc_btc_crowding.png ]; then
            echo "Chart not generated. Exiting."
            exit 0
          fi

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add cftc_btc_crowding.png

          git diff --staged --quiet || \
          git commit -m "chore: update weekly CFTC chart"

          git push
