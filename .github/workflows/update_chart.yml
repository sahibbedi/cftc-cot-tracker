name: Weekly CFTC Chart Update

on:
  schedule:
    # Runs at 4:30 PM ET every Friday (20:30 UTC)
    - cron: '30 20 * * 5'
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Tracker Script
        run: python tracker.py

      - name: Commit and Push Image
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add cftc_btc_crowding.png
          git commit -m "chore: Update weekly CFTC CoT chart" || echo "No changes to commit"
          git push
